[build]
builder = "nixpacks"
nixpacksConfigPath = "nixpacks.toml"
buildCommand = "npm ci && npx prisma generate && npx prisma migrate deploy && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static"

[deploy]
startCommand = "node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
